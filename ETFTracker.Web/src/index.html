<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Portify – Investment Tracker for Irish Investors</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- ── Primary SEO ─────────────────────────────────────────────────── -->
  <meta name="description" content="Portify is a free investment portfolio tracker designed for Irish investors. Track ETFs, stocks, crypto and funds. Automatic deemed disposal tax calculations, real-time prices and portfolio sharing.">
  <meta name="keywords" content="investment tracker Ireland, ETF tracker, portfolio tracker, deemed disposal calculator, Irish tax investments, stock tracker, crypto portfolio, investment app Ireland, Portify">
  <meta name="author" content="Portify">
  <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1">
  <link rel="canonical" href="https://www.prt-fy.com/">

  <!-- ── Open Graph (Facebook / LinkedIn) ────────────────────────────── -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Portify">
  <meta property="og:url" content="https://www.prt-fy.com/">
  <meta property="og:title" content="Portify – Investment Tracker for Irish Investors">
  <meta property="og:description" content="Track your ETFs, stocks, crypto and funds in one place. Automatic deemed disposal tax calculations, real-time prices and portfolio sharing — built for Irish investors.">
  <meta property="og:image" content="https://www.prt-fy.com/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:locale" content="en_IE">

  <!-- ── Twitter / X Card ────────────────────────────────────────────── -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Portify – Investment Tracker for Irish Investors">
  <meta name="twitter:description" content="Track ETFs, stocks, crypto and funds. Automatic deemed disposal tax calculations and real-time prices — free for Irish investors.">
  <meta name="twitter:image" content="https://www.prt-fy.com/og-image.png">

  <!-- ── Structured Data (JSON-LD) ───────────────────────────────────── -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "Portify",
    "url": "https://www.prt-fy.com",
    "description": "Free investment portfolio tracker for Irish investors. Track ETFs, stocks, crypto and funds with automatic deemed disposal tax calculations and real-time prices.",
    "applicationCategory": "FinanceApplication",
    "operatingSystem": "Web",
    "offers": {
      "@type": "Offer",
      "price": "0",
      "priceCurrency": "EUR"
    },
    "featureList": [
      "Real-time portfolio tracking",
      "Deemed disposal tax calculator",
      "ETF, stock, crypto and fund support",
      "Portfolio sharing",
      "CSV import",
      "Investment projections",
      "Buy and sell history"
    ],
    "audience": {
      "@type": "Audience",
      "geographicArea": {
        "@type": "Country",
        "name": "Ireland"
      }
    }
  }
  </script>

  <!-- ── Favicons & Theme ─────────────────────────────────────────────── -->
  <link rel="icon" type="image/x-icon" href="favicon-v2.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-symbol.png">
  <link rel="apple-touch-icon" href="favicon-symbol.png">
  <meta name="theme-color" content="#1a1a2e">

  <!-- ── Fonts ────────────────────────────────────────────────────────── -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <app-root></app-root>
</body>
</html>
