<div class="modal-overlay" (click)="onCancel()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h2>Add New Buy</h2>
      <button class="close-btn" (click)="onCancel()">×</button>
    </div>

    <div *ngIf="error" class="error-message">
      {{ error }}
    </div>

    <form (ngSubmit)="onSubmit()" class="form">
      <div class="form-group">
        <label for="ticker">Ticker *</label>
        <input
          id="ticker"
          type="text"
          [(ngModel)]="ticker"
          (ngModelChange)="onTickerChange($event)"
          name="ticker"
          placeholder="e.g., VWRL"
          required>
        <div *ngIf="loadingDescription" class="ticker-loading">
          <span class="spinner"></span> Loading ETF info...
        </div>
        <div *ngIf="!loadingDescription && etfDescription" class="ticker-description">
          {{ etfDescription }}
        </div>
      </div>

      <div class="form-group">
        <label for="quantity">Quantity *</label>
        <input
          id="quantity"
          type="number"
          [(ngModel)]="quantity"
          name="quantity"
          placeholder="e.g., 10.5"
          step="0.0001"
          required>
      </div>

      <div class="form-group">
        <label for="purchasePrice">Purchase Price (EUR) *</label>
        <input
          id="purchasePrice"
          type="number"
          [(ngModel)]="purchasePrice"
          name="purchasePrice"
          placeholder="e.g., 45.50"
          step="0.01"
          required>
      </div>

      <div class="form-group">
        <label for="purchaseDate">Purchase Date *</label>
        <input
          id="purchaseDate"
          type="date"
          [(ngModel)]="purchaseDate"
          name="purchaseDate"
          required>
      </div>

      <div class="form-actions">
        <button type="button" class="btn btn-secondary" (click)="onCancel()" [disabled]="loading">
          Cancel
        </button>
        <button type="submit" class="btn btn-primary" [disabled]="loading">
          {{ loading ? 'Adding...' : 'Add Transaction' }}
        </button>
      </div>
    </form>
  </div>
</div>
